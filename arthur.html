<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0A"/>
  <title>Arthur's Phone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; }
    body { background: #1a1917; font-family: 'Inter Tight', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/arthur.tsx"></script>
</body>
</html>
